<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPI Profiler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        select,
        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus,
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            margin-top: 3px;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: normal;
            font-size: 0.9em;
        }

        .event-name {
            font-weight: 600;
            color: #667eea;
        }

        .event-desc {
            color: #666;
            font-size: 0.85em;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .output {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .output.show {
            display: block;
        }

        .output h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .output pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #fee;
            border-left-color: #f44;
            color: #c33;
        }

        .success {
            background: #efe;
            border-left-color: #4c4;
            color: #363;
        }

        .warning {
            color: #ff6b6b;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>PAPI Profiler</h1>
        <p class="subtitle">Profile llama.cpp models with PAPI hardware counters</p>

        <div class="form-group">
            <label for="model">Select Model</label>
            <select id="model">
                <option value="">Loading models...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Select PAPI Events (max 4)</label>
            <p class="warning" id="event-warning" style="display: none;">Maximum 4 events allowed</p>
            <div class="checkbox-grid" id="events"></div>
        </div>

        <div class="form-group">
            <label for="prompt">Prompt</label>
            <textarea id="prompt" rows="3"
                placeholder="Enter your prompt here...">What is the capital of Sweden?</textarea>
        </div>

        <div class="form-group">
            <label for="n_predict">Tokens to Generate</label>
            <input type="number" id="n_predict" value="64" min="1" max="2048">
        </div>

        <button id="run-btn" onclick="runProfile()">Run Profiling</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Running profiling...</p>
        </div>

        <div class="output" id="output"></div>

        <!-- CSV Measurements -->
        <div class="output" id="csv-output" style="margin-top: 20px;"></div>

        <!-- Analysis Section -->
        <div id="analysis-section" style="margin-top: 30px; padding-top: 30px; border-top: 2px solid #e0e0e0;">
            <h2 style="margin-bottom: 20px; color: #333;">Roofline Analysis</h2>
            <p style="color: #666; margin-bottom: 20px; font-style: italic;">
                Note: Currently showing hardcoded example kernels for demonstration.
                Future integration will plot actual PAPI profiling data.
            </p>

            <div class="form-group">
                <label for="hardware">Hardware Profile</label>
                <select id="hardware">
                    <option value="">Loading hardware profiles...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="plot-style">Plot Style</label>
                <select id="plot-style">
                    <option value="academic">Academic (Linear)</option>
                    <option value="loglog">Log-Log</option>
                    <option value="advisor">Intel Advisor Style</option>
                </select>
            </div>

            <button onclick="runAnalysis()">Generate Roofline Plot</button>

            <div class="loading" id="analysis-loading">
                <div class="spinner"></div>
                <p>Generating analysis...</p>
            </div>

            <div class="output" id="analysis-output"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let lastProfilingOutput = null;

        // Load models on page load
        async function loadModels() {
            try {
                const response = await fetch(`${API_URL}/models`);
                const models = await response.json();

                const select = document.getElementById('model');
                select.innerHTML = '';

                if (models.length === 0) {
                    select.innerHTML = '<option value="">No models found</option>';
                    return;
                }

                models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.path;
                    option.textContent = model.display_name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading models:', error);
                document.getElementById('model').innerHTML = '<option value="">Error loading models</option>';
            }
        }

        // Load events on page load
        async function loadEvents() {
            try {
                const response = await fetch(`${API_URL}/events`);
                const events = await response.json();

                const container = document.getElementById('events');
                container.innerHTML = '';

                events.forEach(event => {
                    const div = document.createElement('div');
                    div.className = 'checkbox-item';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = event.name;
                    checkbox.value = event.name;
                    checkbox.onchange = validateEventSelection;

                    const label = document.createElement('label');
                    label.htmlFor = event.name;
                    label.innerHTML = `<span class="event-name">${event.name}</span><br><span class="event-desc">${event.description}</span>`;

                    div.appendChild(checkbox);
                    div.appendChild(label);
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading events:', error);
            }
        }

        // Validate event selection (max 4)
        function validateEventSelection() {
            const checkboxes = document.querySelectorAll('#events input[type="checkbox"]');
            const checked = Array.from(checkboxes).filter(cb => cb.checked);
            const warning = document.getElementById('event-warning');

            if (checked.length > 4) {
                warning.style.display = 'block';
                this.checked = false;
            } else {
                warning.style.display = 'none';
            }
        }

        // Run profiling
        async function runProfile() {
            const modelPath = document.getElementById('model').value;
            const prompt = document.getElementById('prompt').value;
            const nPredict = parseInt(document.getElementById('n_predict').value);

            const checkboxes = document.querySelectorAll('#events input[type="checkbox"]:checked');
            const events = Array.from(checkboxes).map(cb => cb.value);

            // Validation
            if (!modelPath) {
                alert('Please select a model');
                return;
            }

            if (events.length === 0) {
                alert('Please select at least one PAPI event');
                return;
            }

            if (!prompt.trim()) {
                alert('Please enter a prompt');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('output').classList.remove('show');
            document.getElementById('run-btn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model_path: modelPath,
                        events: events,
                        prompt: prompt,
                        n_predict: nPredict
                    })
                });

                const result = await response.json();

                // Hide loading
                document.getElementById('loading').classList.remove('show');
                document.getElementById('run-btn').disabled = false;

                // Show output
                const outputDiv = document.getElementById('output');
                outputDiv.classList.add('show');

                if (result.success) {
                    outputDiv.className = 'output show success';
                    outputDiv.innerHTML = `
                        <h3>Profiling Results</h3>
                        <pre>${result.stdout || 'No output'}</pre>
                        ${result.stderr ? `<h3>Stderr</h3><pre>${result.stderr}</pre>` : ''}
                    `;
                } else {
                    outputDiv.className = 'output show error';
                    outputDiv.innerHTML = `
                        <h3>Error (exit code: ${result.returncode})</h3>
                        <pre>${result.stderr || result.stdout || 'Unknown error'}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('run-btn').disabled = false;

                const outputDiv = document.getElementById('output');
                outputDiv.className = 'output show error';
                outputDiv.classList.add('show');
                outputDiv.innerHTML = `
                    <h3>Error</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }

        // Load hardware profiles
        async function loadHardware() {
            try {
                const response = await fetch(`${API_URL}/hardware`);
                const hardware = await response.json();

                const select = document.getElementById('hardware');
                select.innerHTML = '';

                hardware.forEach(hw => {
                    const option = document.createElement('option');
                    option.value = hw.name;
                    option.textContent = hw.label;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading hardware:', error);
                document.getElementById('hardware').innerHTML = '<option value="">Error loading hardware</option>';
            }
        }

        // Run analysis
        async function runAnalysis() {
            // TODO: Remove this check when integrating with live profiling data
            // Currently we show hardcoded examples regardless of profiling output

            const hardware = document.getElementById('hardware').value;
            const style = document.getElementById('plot-style').value;

            if (!hardware) {
                alert('Please select a hardware profile');
                return;
            }

            // Show loading
            document.getElementById('analysis-loading').classList.add('show');
            document.getElementById('analysis-output').classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        profiling_output: lastProfilingOutput || "dummy",  // TODO: Use actual PAPI output
                        hardware: hardware,
                        style: style
                    })
                });

                const result = await response.json();

                // Hide loading
                document.getElementById('analysis-loading').classList.remove('show');

                if (result.success) {
                    const outputDiv = document.getElementById('analysis-output');
                    outputDiv.className = 'output show success';

                    const metrics = result.metrics;

                    // Display kernel information
                    let kernelsHtml = '<div style="background: white; padding: 15px; border-radius: 6px; margin-bottom: 15px;">';
                    kernelsHtml += '<h4 style="margin-bottom: 10px;">Example Kernels Plotted:</h4>';
                    kernelsHtml += '<table style="width: 100%; border-collapse: collapse;">';
                    kernelsHtml += '<tr style="border-bottom: 1px solid #ddd; font-weight: bold;"><td>Kernel</td><td>AI (FLOP/Byte)</td><td>Perf (GFLOP/s)</td></tr>';

                    metrics.kernels.forEach(k => {
                        kernelsHtml += `<tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 8px;">${k.label}</td>
                            <td style="padding: 8px;">${k.ai.toFixed(4)}</td>
                            <td style="padding: 8px;">${k.perf_gflops.toFixed(2)}</td>
                        </tr>`;
                    });

                    kernelsHtml += '</table></div>';

                    outputDiv.innerHTML = `
                        <h3>Roofline Analysis</h3>
                        <div style="background: #fffbea; border-left: 4px solid #f39c12; padding: 12px; margin-bottom: 15px; border-radius: 4px;">
                            <strong>Note:</strong> ${metrics.note}
                        </div>
                        ${kernelsHtml}
                        <h3>Roofline Plot</h3>
                        <img src="${API_URL}${result.plot_url}" style="width: 100%; border-radius: 6px; margin-top: 10px;" alt="Roofline Plot">
                        <p style="margin-top: 10px; color: #666; font-size: 0.9em;">
                            Hardware: ${metrics.hardware} | Style: ${metrics.style}
                        </p>
                    `;
                } else {
                    const outputDiv = document.getElementById('analysis-output');
                    outputDiv.className = 'output show error';
                    outputDiv.innerHTML = `
                        <h3>Analysis Failed</h3>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('analysis-loading').classList.remove('show');

                const outputDiv = document.getElementById('analysis-output');
                outputDiv.className = 'output show error';
                outputDiv.classList.add('show');
                outputDiv.innerHTML = `
                    <h3>Error</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }

        // Update runProfile to save output and show analysis section
        const originalRunProfile = runProfile;
        runProfile = async function() {
            const modelPath = document.getElementById('model').value;
            const prompt = document.getElementById('prompt').value;
            const nPredict = parseInt(document.getElementById('n_predict').value);

            const checkboxes = document.querySelectorAll('#events input[type="checkbox"]:checked');
            const events = Array.from(checkboxes).map(cb => cb.value);

            // Validation
            if (!modelPath) {
                alert('Please select a model');
                return;
            }

            if (events.length === 0) {
                alert('Please select at least one PAPI event');
                return;
            }

            if (!prompt.trim()) {
                alert('Please enter a prompt');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('output').classList.remove('show');
            document.getElementById('run-btn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model_path: modelPath,
                        events: events,
                        prompt: prompt,
                        n_predict: nPredict
                    })
                });

                const result = await response.json();

                // Hide loading
                document.getElementById('loading').classList.remove('show');
                document.getElementById('run-btn').disabled = false;

                // Show output
                const outputDiv = document.getElementById('output');
                outputDiv.classList.add('show');

                if (result.success) {
                    // Save profiling output for future integration
                    // TODO: Use this when integrating with live PAPI data
                    lastProfilingOutput = result.stdout;

                    outputDiv.className = 'output show success';
                    outputDiv.innerHTML = `
                        <h3>Profiling Results</h3>
                        <pre>${result.stdout || 'No output'}</pre>
                        ${result.stderr ? `<h3>Stderr</h3><pre>${result.stderr}</pre>` : ''}
                    `;

                    // Load and display the CSV file
                    loadAndDisplayCSV();
                } else {
                    outputDiv.className = 'output show error';
                    outputDiv.innerHTML = `
                        <h3>Error (exit code: ${result.returncode})</h3>
                        <pre>${result.stderr || result.stdout || 'Unknown error'}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('run-btn').disabled = false;

                const outputDiv = document.getElementById('output');
                outputDiv.className = 'output show error';
                outputDiv.classList.add('show');
                outputDiv.innerHTML = `
                    <h3>Error</h3>
                    <pre>${error.message}</pre>
                `;
            }
        };

        // Load and display raw CSV after profiling
        async function loadAndDisplayCSV() {
            try {
                const response = await fetch(`${API_URL}/measurements.csv`);
                const csvText = await response.text();

                const csvOutput = document.getElementById('csv-output');
                csvOutput.className = 'output show success';
                csvOutput.innerHTML = `
                    <h3>Measurements CSV</h3>
                    <pre style="white-space: pre-wrap; word-wrap: break-word;">${csvText}</pre>
                `;
            } catch (error) {
                const csvOutput = document.getElementById('csv-output');
                csvOutput.className = 'output show error';
                csvOutput.innerHTML = `
                    <h3>Error Loading CSV</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }

        // Initialize on page load
        window.onload = () => {
            loadModels();
            loadEvents();
            loadHardware();
        };
    </script>
</body>

</html>
