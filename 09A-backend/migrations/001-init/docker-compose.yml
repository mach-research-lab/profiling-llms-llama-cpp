services:
  db:
    image: postgres:16
    container_name: myapp-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - ./001_init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data


volumes:
  pgdata:
